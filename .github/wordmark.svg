<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 515 100" width="515" height="100">
  <style>
    .t {
      font-family: 'Courier New', Courier, monospace;
      font-size: 80px;
      font-weight: 700;
      fill: #ffffff;
    }
    @media (prefers-color-scheme: light) {
      .t { fill: #111111; }
    }
  </style>

  <!-- "ui" -->
  <text class="t" x="0" y="92">ui</text>

  <!--
    Logo replacing capital U:
    - font-size 80px → 1em = 80px → logo height = 80px
    - Courier New char width = 0.6em = 48px → "ui" ends at x=96
    - viewBox "8 5 30 30" (30×30 units) → scale = 80/30 ≈ 2.667
    - translateY(-0.08em) = -6.4px → logo y = (92−80) − 6.4 = 5.6
    - transform: translate(96, 5.6) scale(2.667) translate(-8, −5)
  -->
  <g transform="translate(96,15) scale(2.667) translate(-8,-5)">
    <g transform="translate(6,6)" fill="none" stroke="#ee502c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 4,4 A 12,12 0 0 0 28,4 L 28,16 A 12,12 0 0 1 4,16 Z"/>
      <circle cx="28" cy="16" r="2.5" fill="#ee502c" stroke="none"/>
    </g>
  </g>

  <!-- "niverse" starts at x = 96 + 80 = 176 -->
  <text class="t" x="176" y="92">niverse</text>
</svg>
